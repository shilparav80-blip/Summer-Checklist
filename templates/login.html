{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-orange-400 via-amber-400 to-yellow-300">
    <section class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-8 border border-white/70">
            <div class="text-center mb-8">
                <div class="text-6xl mb-3">☀️</div>
                <h1 class="pacifico text-4xl text-orange-500 mb-1">Summer Checklist</h1>
                <p class="text-gray-400 text-sm">Your private summer planner</p>
            </div>

            {% if error %}
            <div class="bg-red-50 border border-red-100 text-red-500 rounded-xl px-4 py-3 mb-5 text-sm text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autofocus
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-300 mb-5 text-sm"
                >
                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-orange-400 to-amber-400 hover:from-orange-500 hover:to-amber-500 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg text-sm"
                >
                    Open Checklist
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-white/80 mt-4">Make this summer count.</p>
    </section>
</main>
{% endblock %}
